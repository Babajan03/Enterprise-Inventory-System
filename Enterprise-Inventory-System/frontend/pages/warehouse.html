<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Warehouses</h4>
    <button class="btn btn-primary" onclick="openAddWarehouse()">
        <i class="bi bi-plus-circle"></i> Add Warehouse
    </button>
</div>

<div class="card">
    <div class="card-body table-responsive">
        <table id="warehouseTable" class="table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Country</th>
                    <th>Contact Person</th>
                    <th>Contact Number</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="warehouseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="warehouseModalTitle">Add Warehouse</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="warehouseID" />
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Warehouse Code</label>
                        <input type="text" id="warehouseCode" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Warehouse Name</label>
                        <input type="text" id="warehouseName" class="form-control" />
                    </div>
                    <div class="col-md-12">
                        <label>Address</label>
                        <input type="text" id="warehouseAddress" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>City</label>
                        <input type="text" id="warehouseCity" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>State</label>
                        <input type="text" id="warehouseState" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Country</label>
                        <input type="text" id="warehouseCountry" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Postal Code</label>
                        <input type="text" id="warehousePostalCode" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Contact Person</label>
                        <input type="text" id="warehouseContactPerson" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Contact Number</label>
                        <input type="text" id="warehouseContactNumber" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Status</label>
                        <select id="warehouseIsActive" class="form-select">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveWarehouse()">Save</button>
            </div>
        </div>
    </div>
</div>
