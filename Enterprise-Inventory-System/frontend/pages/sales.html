<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Sales Orders</h4>
    <button class="btn btn-primary" onclick="openCreateSalesOrder()">
        <i class="bi bi-plus-circle"></i> Create Order
    </button>
</div>

<div class="card">
    <div class="card-body table-responsive">
        <table id="salesTable" class="table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>Order No</th>
                    <th>Customer</th>
                    <th>Order Date</th>
                    <th>Status</th>
                    <th>Total Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Create Order Modal -->
<div class="modal fade" id="salesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create Sales Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Order Number</label>
                        <input type="text" id="soNumber" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Customer</label>
                        <select id="soCustomer" class="form-select"></select>
                    </div>
                    <div class="col-md-6">
                        <label>Order Date</label>
                        <input type="date" id="soOrderDate" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Status</label>
                        <select id="soStatus" class="form-select">
                            <option value="Draft">Draft</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Shipped">Shipped</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveSalesOrder()">Create</button>
            </div>
        </div>
    </div>
</div>

<!-- View Items Modal -->
<div class="modal fade" id="salesItemsModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="salesItemsTitle">Order Items</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label>Product</label>
                        <select id="soItemProduct" class="form-select"></select>
                    </div>
                    <div class="col-md-3">
                        <label>Quantity</label>
                        <input type="number" id="soItemQty" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <label>Unit Price</label>
                        <input type="number" id="soItemPrice" class="form-control" />
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-success w-100" onclick="addSalesItem()">
                            <i class="bi bi-plus"></i> Add
                        </button>
                    </div>
                </div>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Unit Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="salesItemsBody"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
