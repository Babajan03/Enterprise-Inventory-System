<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Customers</h4>
    <button class="btn btn-primary" onclick="openAddCustomer()">
        <i class="bi bi-plus-circle"></i> Add Customer
    </button>
</div>

<div class="card">
    <div class="card-body table-responsive">
        <table id="customerTable" class="table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>State</th>
                    <th>Country</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="customerModalTitle">Add Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="customerID" />
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Customer Code</label>
                        <input type="text" id="customerCode" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Email</label>
                        <input type="email" id="customerEmail" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Phone</label>
                        <input type="text" id="customerPhone" class="form-control" />
                    </div>
                    <div class="col-md-12">
                        <label>Address</label>
                        <input type="text" id="customerAddress" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>City</label>
                        <input type="text" id="customerCity" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>State</label>
                        <input type="text" id="customerState" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Country</label>
                        <input type="text" id="customerCountry" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Postal Code</label>
                        <input type="text" id="customerPostalCode" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Status</label>
                        <select id="customerIsActive" class="form-select">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveCustomer()">Save</button>
            </div>
        </div>
    </div>
</div>
