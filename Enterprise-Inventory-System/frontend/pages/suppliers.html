<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Suppliers</h4>
    <button class="btn btn-primary" onclick="openAddSupplier()">
        <i class="bi bi-plus-circle"></i> Add Supplier
    </button>
</div>

<div class="card">
    <div class="card-body">
        <table id="supplierTable" class="table table-striped" style="width:100%">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>GST</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="supplierModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="supplierModalTitle">Add Supplier</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="supplierID" />
                <div class="row g-3">
                    <div class="col-md-6">
                        <label>Supplier Code</label>
                        <input type="text" id="supplierCode" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Supplier Name</label>
                        <input type="text" id="supplierName" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Contact Person</label>
                        <input type="text" id="contactPerson" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Email</label>
                        <input type="email" id="supplierEmail" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>Phone</label>
                        <input type="text" id="supplierPhone" class="form-control" />
                    </div>
                    <div class="col-md-6">
                        <label>GST Number</label>
                        <input type="text" id="gstNumber" class="form-control" />
                    </div>
                    <div class="col-md-12">
                        <label>Address</label>
                        <input type="text" id="addressLine1" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>City</label>
                        <input type="text" id="city" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>State</label>
                        <input type="text" id="stateName" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Country</label>
                        <input type="text" id="countryName" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Postal Code</label>
                        <input type="text" id="postalCode" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label>Status</label>
                        <select id="supplierIsActive" class="form-select">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveSupplier()">Save</button>
            </div>
        </div>
    </div>
</div>
