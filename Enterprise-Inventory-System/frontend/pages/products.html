<div class="card shadow-sm">

    <div class="card-header bg-white">

        <div class="d-flex justify-content-between align-items-center">

            <h4 class="m-0">

                Products

            </h4>

            <button
                class="btn btn-primary"
                id="btnAddProduct">

                <i class="bi bi-plus-circle"></i>

                Add Product

            </button>

        </div>

    </div>

    <div class="card-body">

        <table
            id="productTable"
            class="display table table-striped"
            style="width:100%">

            <thead>

            <tr>

                <th>Code</th>

                <th>Name</th>

                <th>Category</th>

                <th>Brand</th>

                <th>Price</th>

                <th>Min Stock</th>

                <th>Reorder</th>

                <th>Status</th>

                <th width="150">

                    Action

                </th>

            </tr>

            </thead>

        </table>

    </div>

</div>
